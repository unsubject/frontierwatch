name: "Computing & AI Watch"

on:
  schedule:
    # Every Wednesday at 08:00 UTC
    - cron: "0 8 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python -m frontierwatch run computing-ai

      - name: Commit and push RSS feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed_data.json docs/feed.xml
          git commit -m "Update RSS feed: Computing & AI Watch" || true
          git push
